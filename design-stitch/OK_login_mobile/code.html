<body class="bg-background min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
<!-- Decorative Background Elements -->
<div 0="" 2000="" 40="" 40\"="" class="absolute inset-0 pointer-events-none opacity-[0.03] z-0" height='\"40\"' http:="" style="background-image: url('data:image/svg+xml;utf8,&lt;svg xmlns=\" svg\"="" viewbox='\"0' width='\"40\"' www.w3.org=""><path 0="" 0-17="" 0-9="" 0c11.046="" 0zm0="" 1.343="" 1.343-3="" 12="" 12-12="" 12-12-5.373-12-12="" 12-12zm0="" 12s-5.373="" 17="" 17-17s29.389="" 17-7.611="" 17s7.611="" 2.686="" 2.686-6="" 20="" 20-20="" 20s-8.954="" 20s0="" 3="" 3-3="" 3-3-1.343-3-3="" 3-3z\"="" 31.046="" 3c-4.971="" 3c-9.389="" 3c1.657="" 3c3.314="" 3s-1.343="" 3zm0="" 4.029-9="" 5.373="" 5.373-12="" 5c6.627="" 6="" 6-6="" 6-6-2.686-6-6="" 6-6zm0="" 6s-2.686="" 7.611-17="" 8.954="" 9="" 9-4.029="" 9-9-4.029-9-9-9zm0="" 9s4.029="" d='\"M20' fill='\"%231a1c1c\"/'>');"&gt;</path></div>
<div class="absolute top-0 left-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2 z-0"></div>
<div class="absolute bottom-0 right-0 w-80 h-80 bg-tertiary/5 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 z-0"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-container-padding-mobile z-10 relative">
<!-- Brand / Header -->
<div class="flex flex-col items-center mb-stack-lg">
<h1 class="font-h1 text-h1 text-primary italic font-black tracking-tighter mb-stack-sm">COMANDA PRO</h1>
<h2 class="font-h2 text-h2 text-on-surface text-center mb-unit">Entrar no painel</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Acesse sua conta para gerenciar seu restaurante</p>
</div>
<!-- Login Card / Form -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] p-stack-lg">
<!-- Error Message Example (Simulated Active State) -->
<div class="bg-error-container text-on-error-container p-stack-sm rounded-lg flex items-center mb-stack-md">
<span class="material-symbols-outlined mr-unit">error</span>
<span class="font-body-sm text-body-sm">E-mail ou senha incorretos</span>
</div>
<form class="flex flex-col gap-stack-md">
<!-- Email Field -->
<div class="relative">
<label class="sr-only" for="email">E-mail</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-lg bg-surface font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="E-mail" type="email" value="admin@restaurante.com"/>
</div>
<!-- Password Field -->
<div class="relative">
<label class="sr-only" for="password">Senha</label>
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-secondary">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-error rounded-lg bg-error-container/10 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-error focus:border-error transition-colors" id="password" name="password" placeholder="Senha" type="password" value="password123"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-secondary hover:text-on-surface transition-colors">visibility_off</span>
</div>
</div>
<!-- Utilities Row -->
<div class="flex items-center justify-between mt-unit">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-surface-variant rounded bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Lembrar acesso
                        </label>
</div>
<div class="text-sm">
<a class="font-label-bold text-label-bold text-primary hover:text-primary-container transition-colors" href="#">
                            Esqueci minha senha
                        </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-[0_8px_30px_rgba(234,29,44,0.15)] font-label-bold text-label-bold text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary mt-stack-sm transition-all active:scale-95 duration-150" type="button">
<!-- Subtle loading state simulation -->
<span class="material-symbols-outlined animate-spin mr-2 text-[18px]">progress_activity</span>
                    Entrando...
                </button>
</form>
</div>
<!-- Support Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Precisa de ajuda? <a class="font-label-bold text-primary hover:underline" href="#">Fale com o suporte</a>
</p>
</div>
