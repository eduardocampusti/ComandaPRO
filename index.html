<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comanda Digital Pro</title>
    <script>
      // Initialize theme to prevent flash
      try {
        const theme = localStorage.getItem('theme') || 'system';
        const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      } catch (e) {}
      
      // Define global for Node.js polyfills
      if (typeof global === 'undefined') {
        window.global = window;
      }
      // Prevent polyfills from throwing when trying to overwrite window.fetch
      if (typeof window !== 'undefined' && window.fetch) {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: () => originalFetch,
          set: (val) => {
            // Ignore attempts to overwrite native fetch
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
