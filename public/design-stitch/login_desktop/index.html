<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Comanda Pro - Login Desktop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "error": "#ba1a1a",
                        "primary-fixed": "#ffdad7",
                        "surface-container-high": "#e8e8e8",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#474747",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#ffb3ad",
                        "on-tertiary-fixed": "#271900",
                        "tertiary": "#795600",
                        "surface-container": "#eeeeee",
                        "on-surface": "#1a1c1c",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-tertiary-container": "#fffbff",
                        "secondary-fixed": "#e4e2e1",
                        "inverse-on-surface": "#f1f1f1",
                        "on-surface-variant": "#5d3f3d",
                        "on-tertiary-fixed-variant": "#5e4200",
                        "inverse-primary": "#ffb3ad",
                        "secondary-fixed-dim": "#c8c6c6",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#fffbff",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#ffdea8",
                        "secondary-container": "#e4e2e1",
                        "secondary": "#5f5e5e",
                        "tertiary-container": "#986d00",
                        "tertiary-fixed-dim": "#ffba20",
                        "on-primary-fixed-variant": "#930013",
                        "on-primary-fixed": "#410004",
                        "background": "#f9f9f9",
                        "surface-container-low": "#f3f3f3",
                        "outline": "#926e6b",
                        "surface": "#f9f9f9",
                        "outline-variant": "#e7bcb9",
                        "surface-tint": "#c0001c",
                        "inverse-surface": "#2f3131",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1c",
                        "on-secondary-container": "#656464",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#e6182a",
                        "primary": "#bb001b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "section-gap": "48px",
                        "container-padding-mobile": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "unit": "4px",
                        "container-padding-desktop": "40px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "label-bold": ["Inter"],
                        "price-display": ["Plus Jakarta Sans"],
                        "h3": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1.0", "fontWeight": "600" }],
                        "price-display": ["20px", { "lineHeight": "1.0", "fontWeight": "700" }],
                        "h3": ["20px", { "lineHeight": "1.3", "fontWeight": "700" }]

                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-background bg-[url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=1920&amp;q=80')] bg-cover bg-center" data-alt="A highly professional and clean background image subtly depicting a modern, high-end restaurant kitchen or dining area. The lighting is soft and ambient, creating a sophisticated corporate mood. The scene is slightly out of focus to serve as an elegant backdrop, utilizing a palette of stark whites, deep charcoals, and subtle warm tones. The overall aesthetic perfectly complements a high-velocity, modern restaurant management dashboard interface.">
<div class="absolute inset-0 bg-background/80 backdrop-blur-sm z-0"></div>
<main class="relative z-10 w-full max-w-md px-container-padding-mobile md:px-0">
<div class="bg-surface rounded-xl shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-surface-variant overflow-hidden">
<div class="p-stack-lg flex flex-col items-center border-b border-surface-variant/50">
<span class="text-primary font-h1 text-h1 italic tracking-tighter mb-stack-sm">COMANDA PRO</span>
<h1 class="font-h2 text-h2 text-on-surface mb-unit">Entrar no painel</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Acesse sua conta para gerenciar pedidos e configurações da loja.</p>
</div>
<div class="p-stack-lg bg-surface-container-lowest">
<div class="mb-stack-md bg-error-container border border-error/20 rounded-lg p-3 flex items-start gap-3">
<span class="material-symbols-outlined text-error mt-0.5" data-weight="fill" style="font-variation-settings: 'FILL' 1;">error</span>
<div>
<span class="font-label-bold text-label-bold text-on-error-container block mb-1">Erro de autenticação</span>
<span class="font-body-sm text-body-sm text-on-error-container">As credenciais fornecidas estão incorretas. Por favor, tente novamente.</span>
</div>
</div>
<form class="space-y-stack-md">
<div class="space-y-unit">
<label class="font-label-bold text-label-bold text-on-surface block" for="email">E-mail corporativo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-surface-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="seu@email.com" type="email" value="admin@centralkitchen.com"/>
</div>
</div>
<div class="space-y-unit">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface block" for="password">Senha</label>
<a class="font-label-bold text-label-bold text-primary hover:text-primary-container transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface border border-error rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-error focus:border-error transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="w-4 h-4 rounded border-surface-variant text-primary focus:ring-primary bg-surface" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Lembrar-me neste dispositivo</label>
</div>
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-bold text-label-bold py-3 px-4 rounded-lg shadow-[0_4px_12px_rgba(187,0,27,0.2)] hover:shadow-[0_6px_16px_rgba(187,0,27,0.3)] transition-all active:translate-y-px flex justify-center items-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
</div>
<div class="bg-surface-container-low p-4 text-center border-t border-surface-variant">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Problemas para acessar? <a class="text-primary font-label-bold hover:underline" href="#">Contatar Suporte TI</a>
</p>
</div>
</div>
</main>
</body></html>
